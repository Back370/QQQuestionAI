name: web-ci

# GitHub Actions は repo root の .github/workflows のみ実行するため、
# monorepo の frontend スタックはここで paths 絞り + working-directory で対象化する。
on:
  push:
    branches: [main]
    paths:
      - "manji-standard-server-web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "manji-standard-server-web/**"
      - ".github/workflows/web-ci.yml"

defaults:
  run:
    working-directory: manji-standard-server-web

jobs:
  # 型チェック + 生成物のビルド + コンポーネントテスト(実 backend 不要・毎回)
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: manji-standard-server-web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      # next build = 本番ビルド + 型検証(生成された CRUD/pages が実際にコンパイルできることの保証)
      - run: npm run build

  # codegen 再現性ゲート(manji流): 生成器を再実行して差分ゼロを強制
  codegen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: manji-standard-server-web/package-lock.json
      - run: npm ci
      - run: npm run gen
      - name: assert generated code is committed & reproducible
        working-directory: .
        run: |
          if [ -n "$(git status --porcelain -- manji-standard-server-web)" ]; then
            echo "::error::generated code drifted — regenerate & commit"
            git status --porcelain -- manji-standard-server-web
            git --no-pager diff -- manji-standard-server-web
            exit 1
          fi
