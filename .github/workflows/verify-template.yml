# テンプレート自身の安全網が壊れていないかを毎push検査する。
# 検査内容は scripts/verify_safety_net.py を参照（hookの回帰テスト、
# settings.jsonのdenyベースライン、スキルの整合性、CI雛形の構文、
# workflows自体の構文とactionのSHA固定、リンク切れ）。
name: verify-template
on:
  pull_request:
  push:
    branches: [main]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # actionはサプライチェーン対策としてコミットSHAで固定する（タグは書き換え可能なため）。
      # 更新はDependabot（.github/dependabot.yml）がPRで追従する。
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python3 scripts/verify_safety_net.py